name: Auto Post to X

on:
  schedule:
    - cron: '0 1 * * *'   # 10:00 JST基準 + ランダム遅延 → note投稿
    - cron: '0 12 * * *'  # 21:00 JST基準 + ランダム遅延 → SEO投稿
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Post type (note / seo)'
        required: false
        default: 'note'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Random delay (0–90 min)
        run: sleep $((RANDOM % 5400))

      - name: Set post type
        run: |
          if [ -n "${{ github.event.inputs.post_type }}" ]; then
            echo "POST_TYPE=${{ github.event.inputs.post_type }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            echo "POST_TYPE=note" >> $GITHUB_ENV
          else
            echo "POST_TYPE=seo" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib anthropic feedparser beautifulsoup4

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post.py
