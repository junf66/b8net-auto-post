name: Auto Post to X

on:
  schedule:
    - cron: '0 1 * * *'          # 10:00 JST + ランダム遅延最大90分 → SEO投稿（毎日 10:00〜11:30）
    - cron: '30 10 * * 1,3,6'    # 19:30 JST + ランダム遅延最大3h → note投稿（月水土 19:30〜22:30）
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Post type (note / seo)'
        required: false
        default: 'note'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Random delay (schedule only)
        if: github.event_name == 'schedule'
        run: |
          if [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            sleep $((RANDOM % 5400))   # seo: 0–90分（10:00〜11:30）
          else
            sleep $((RANDOM % 10800))  # note: 0–180分（19:30〜22:30）
          fi

      - name: Set post type
        run: |
          if [ -n "${{ github.event.inputs.post_type }}" ]; then
            echo "POST_TYPE=${{ github.event.inputs.post_type }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 10 * * 1,3,6" ]; then
            echo "POST_TYPE=note" >> $GITHUB_ENV
          else
            echo "POST_TYPE=seo" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post.py

      - name: Commit posted log
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f posted_urls.json posted_tweets.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update post logs [skip ci]"
          git pull --rebase origin main || {
            git rebase --abort || true
            echo "Rebase conflict. Aborting."
            exit 1
          }
          git push origin HEAD:main
